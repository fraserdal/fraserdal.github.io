<!DOCTYPE html>
<html>
<head>
<title>Fraser's Website</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:white;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:#111827;
    border-bottom:1px solid #334155;
}

.logo{
    font-size:18px;
    font-weight:bold;
    color:#60a5fa;
}

.links a{
    color:white;
    text-decoration:none;
    margin-left:15px;
    padding:8px 12px;
    border-radius:8px;
}

.links a:hover{
    background:#2563eb;
}

.active{
    background:#3b82f6;
}

/* MAIN */
.container{
    height:calc(100vh - 60px);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

h1{
    font-size:50px;
    color:#60a5fa;
}

p{
    color:#cbd5e1;
}

.button{
    margin-top:20px;
    padding:15px 25px;
    background:#2563eb;
    color:white;
    border-radius:10px;
    text-decoration:none;
}

.button:hover{
    background:#3b82f6;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">🎮 Fraser's Website</div>

    <div class="links">
        <a href="index.html" class="active">Home</a>
        <a href="games.html">Games</a>
        <a href="tools.html">Tools</a>
    </div>

</div>

<!-- MAIN -->
<div class="container">

    <h1>🎮 Fraser's Website</h1>
    <p>Simple arcade with mini games</p>

    <a class="button" href="games.html">▶ Enter Games</a>

</div>

</body>
</html>
