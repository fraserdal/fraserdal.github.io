<!DOCTYPE html>
<html>
<head>
<title>Fraser's Website</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:white;
    text-align:center;
}

h1{
    font-size:50px;
    margin-bottom:10px;
    color:#60a5fa;
    text-shadow:0 0 20px #3b82f6;
}

p{
    color:#cbd5e1;
    margin-bottom:30px;
}

a{
    text-decoration:none;
}

.button{
    padding:15px 25px;
    background:#2563eb;
    color:white;
    border-radius:10px;
    font-size:18px;
    transition:.2s;
}

.button:hover{
    background:#3b82f6;
    transform:scale(1.05);
}

.footer{
    position:absolute;
    bottom:15px;
    font-size:12px;
    color:#64748b;
}
</style>

</head>

<body>

<h1>🎮 Fraser's Arcade</h1>

<a href="games.html" class="button">▶ Enter Games</a>

<div class="footer">
</div>

</body>
</html>
