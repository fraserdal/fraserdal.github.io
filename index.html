<!DOCTYPE html>
<html>
<head>
<title>Fraser's Website</title>

<style>
    .navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:#111827;
    border-bottom:1px solid #334155;
}

.logo{
    font-size:18px;
    font-weight:bold;
    color:#60a5fa;
}

.links a{
    color:white;
    text-decoration:none;
    margin-left:15px;
    padding:8px 12px;
    border-radius:8px;
    transition:.2s;
}

.links a:hover{
    background:#2563eb;
}
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:white;
    text-align:center;
}

h1{
    font-size:50px;
    margin-bottom:10px;
    color:#60a5fa;
    text-shadow:0 0 20px #3b82f6;
}

p{
    color:#cbd5e1;
    margin-bottom:30px;
}

a{
    text-decoration:none;
}

.button{
    padding:15px 25px;
    background:#2563eb;
    color:white;
    border-radius:10px;
    font-size:18px;
    transition:.2s;
}

.button:hover{
    background:#3b82f6;
    transform:scale(1.05);
}

.footer{
    position:absolute;
    bottom:15px;
    font-size:12px;
    color:#64748b;
}
</style>

</head>

<body>
    <div class="navbar">
    <div class="logo">🎮 Fraser's Arcade</div>

    <div class="links">
        <a href="index.html">Home</a>
        <a href="games.html">Games</a>
    </div>
</div>

<h1> Fraser's Website</h1>

<a href="games.html" class="button">▶ Enter Games</a>

<div class="footer">
</div>

</body>
</html>
