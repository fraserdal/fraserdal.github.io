<!DOCTYPE html>
<html>
<head>
    <title>Games</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #111;
            color: white;
            margin-top: 50px;
        }

        h1, h2 {
            color: #4da3ff;
        }

        a {
            color: #4da3ff;
            margin: 10px;
            text-decoration: none;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        #box {
            width: 220px;
            height: 220px;
            margin: 30px auto;
            background: red;
            display: none;
            cursor: pointer;
            border-radius: 10px;
        }

      

        hr {
            margin: 40px 0;
        }
    </style>
</head>

<body>

    <h1>Games Arcade</h1>

    <a href="index.html">Home</a> |
    <a href="about.html">About</a> |
    <a href="games.html">Games</a>

    <!-- ================= REACTION GAME ================= -->
    <hr>

    <h2>Reaction Time Game</h2>
    <p>Click start, then click green as fast as you can</p>

    <button onclick="startGame()">Start</button>

    <div id="box"></div>

    <h3 id="result"></h3>

  

    <!-- ================= SCRIPT ================= -->
    <script>
        // ================= REACTION GAME =================
        let startTime = 0;
        let canClick = false;

        let bestTime = localStorage.getItem("bestTime");
        bestTime = bestTime ? parseInt(bestTime) : null;

        function startGame() {
            const box = document.getElementById("box");
            const result = document.getElementById("result");

            result.innerText = "";
            canClick = false;

            box.style.display = "none";
            box.style.backgroundColor = "red";

            let delay = Math.random() * 4000 + 1000;

            setTimeout(() => {
                box.style.display = "block";
                box.style.backgroundColor = "green";
                startTime = Date.now();
                canClick = true;
            }, delay);
        }

        document.getElementById("box").onclick = function () {
            const result = document.getElementById("result");

            if (!canClick) {
                result.innerText = "Too soon! Wait for green.";
                this.style.display = "none";
                return;
            }

            let reactionTime = Date.now() - startTime;

            if (bestTime === null || reactionTime < bestTime) {
                bestTime = reactionTime;
                localStorage.setItem("bestTime", bestTime);
            }

            let text = "Your reaction time: " + reactionTime + " ms";

            if (bestTime !== null) {
                text += "\nBest time: " + bestTime + " ms";
            }

            result.innerText = text;

            this.style.display = "none";
            canClick = false;
        };

       

</body>
</html>
