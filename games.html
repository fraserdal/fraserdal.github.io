<!DOCTYPE html>
<html>
<head>
    <title>Mini Arcade</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
            margin: 0;
        }

        h1 {
            color: #4da3ff;
            margin-top: 20px;
        }

        #menu {
            padding: 30px;
        }

        .tile {
            display: inline-block;
            background: #222;
            padding: 20px;
            margin: 10px;
            width: 180px;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.2s;
        }

        .tile:hover {
            background: #4da3ff;
            color: black;
        }

        .game {
            display: none;
            padding: 20px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }

        canvas {
            background: black;
            display: block;
            margin: 20px auto;
        }

        #target {
            width: 40px;
            height: 40px;
            background: red;
            position: absolute;
            display: none;
            border-radius: 50%;
            cursor: pointer;
        }

        /* FIX MEMORY CENTERING */
        #memoryBox {
            margin-top: 20px;
        }

        input {
            padding: 8px;
            font-size: 16px;
        }
        
    </style>
</head>

<body>

<h1>Mini Arcade</h1>

<!-- MENU -->
<div id="menu">
  <div class="tile" onclick="showGame('reaction')">⚡ Reaction Time</div>
<div class="tile" onclick="showGame('ttt')">❌⭕ Tic-Tac-Toe</div>
<div class="tile" onclick="showGame('rps')">🪨 Rock Paper Scissors</div>
<div class="tile" onclick="showGame('higher')">🎲 Higher or Lower</div>
</div>

<!-- REACTION -->
<div id="reaction" class="game">
    <h2>⚡ Reaction Time</h2>

    <button onclick="startReaction()">Start</button>
    <button onclick="backToMenu()">⬅ Back</button>

    <div id="reactionBox"
         style="width:200px;height:200px;background:red;
         margin:20px auto;display:none;cursor:pointer;">
    </div>

    <h3 id="reactionResult"></h3>
</div>

<!-- TIC TAC TOE -->
<div id="ttt" class="game">
    <h2>❌⭕ Tic-Tac-Toe</h2>

    <button onclick="resetTTT()">Reset</button>
    <button onclick="backToMenu()">⬅ Back</button>

    <div id="board"></div>

    <h3 id="tttResult"></h3>
</div>

<!-- RPS -->
<div id="rps" class="game">
    <h2>🪨 Rock Paper Scissors</h2>

    <button onclick="playRPS('Rock')">Rock</button>
    <button onclick="playRPS('Paper')">Paper</button>
    <button onclick="playRPS('Scissors')">Scissors</button>

    <button onclick="backToMenu()">⬅ Back</button>

    <h3 id="rpsResult"></h3>
</div>

<!-- HIGHER LOWER -->
<div id="higher" class="game">
    <h2>🎲 Higher or Lower</h2>

    <p id="currentNumber"></p>

    <button onclick="guessHigher()">Higher</button>
    <button onclick="guessLower()">Lower</button>

    <button onclick="backToMenu()">⬅ Back</button>

    <h3 id="higherResult"></h3>
    <h3 id="higherScore"></h3>
</div>
    <div id="memoryBox">
        <h3 id="memoryText"></h3>

        <input id="memoryInput" placeholder="Type number here">
        <button onclick="checkMemory()">Submit</button>

        <h3 id="memoryResult"></h3>
    </div>
</div>

<script>

/* MENU */
function showGame(id) {
    document.getElementById("menu").style.display = "none";

    document.querySelectorAll(".game").forEach(g => {
        g.style.display = "none";
    });

    document.getElementById(id).style.display = "block";
}

function backToMenu() {
    document.getElementById("menu").style.display = "block";

    document.querySelectorAll(".game").forEach(g => {
        g.style.display = "none";
    });
}

/* REACTION TIME */

let reactionStart;
let canClick = false;
let bestTime = localStorage.getItem("bestTime");

function startReaction() {

    const box = document.getElementById("reactionBox");

    document.getElementById("reactionResult").innerText = "";

    canClick = false;
    box.style.display = "none";

    let delay = Math.random() * 4000 + 1000;

    setTimeout(() => {
        box.style.display = "block";
        box.style.background = "green";
        reactionStart = Date.now();
        canClick = true;
    }, delay);
}

document.addEventListener("click", function(e){

    if(e.target.id !== "reactionBox") return;

    if(!canClick){
        document.getElementById("reactionResult").innerText =
            "Too soon!";
        return;
    }

    let time = Date.now() - reactionStart;

    if(!bestTime || time < bestTime){
        bestTime = time;
        localStorage.setItem("bestTime", time);
    }

    document.getElementById("reactionResult").innerText =
        "Time: " + time + "ms | Best: " + bestTime + "ms";

    e.target.style.display = "none";
    canClick = false;
});

/* TIC TAC TOE */

let currentPlayer = "X";
let board = ["","","","","","","","",""];

function drawBoard(){

    const boardDiv = document.getElementById("board");

    boardDiv.innerHTML = "";

    board.forEach((value,index)=>{

        const cell = document.createElement("div");

        cell.className = "cell";
        cell.innerText = value;

        cell.onclick = () => move(index);

        boardDiv.appendChild(cell);
    });
}

function move(index){

    if(board[index] !== "") return;

    board[index] = currentPlayer;

    drawBoard();

    const wins = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    for(let win of wins){

        if(
            board[win[0]] &&
            board[win[0]] === board[win[1]] &&
            board[win[1]] === board[win[2]]
        ){
            document.getElementById("tttResult").innerText =
                currentPlayer + " wins!";
            return;
        }
    }

    currentPlayer = currentPlayer === "X" ? "O" : "X";
}

function resetTTT(){
    board = ["","","","","","","","",""];
    currentPlayer = "X";
    document.getElementById("tttResult").innerText = "";
    drawBoard();
}

drawBoard();

/* RPS */

function playRPS(player){

    const choices = ["Rock","Paper","Scissors"];
    const cpu = choices[Math.floor(Math.random()*3)];

    let result;

    if(player === cpu){
        result = "Draw";
    }
    else if(
        (player==="Rock"&&cpu==="Scissors") ||
        (player==="Paper"&&cpu==="Rock") ||
        (player==="Scissors"&&cpu==="Paper")
    ){
        result = "You win!";
    }
    else{
        result = "Computer wins!";
    }

    document.getElementById("rpsResult").innerText =
        "CPU chose " + cpu + " — " + result;
}

/* HIGHER LOWER */

let currentNum = Math.floor(Math.random()*100)+1;
let score = 0;

document.getElementById("currentNumber").innerText =
    "Number: " + currentNum;

document.getElementById("higherScore").innerText =
    "Score: 0";

function guessHigher(){
    playHigherLower(true);
}

function guessLower(){
    playHigherLower(false);
}

function playHigherLower(higher){

    let nextNum = Math.floor(Math.random()*100)+1;

    let correct =
        higher ? nextNum > currentNum
               : nextNum < currentNum;

    if(correct){
        score++;
        document.getElementById("higherResult").innerText =
            "Correct!";
    }
    else{
        score = 0;
        document.getElementById("higherResult").innerText =
            "Wrong!";
    }

    currentNum = nextNum;

    document.getElementById("currentNumber").innerText =
        "Number: " + currentNum;

    document.getElementById("higherScore").innerText =
        "Score: " + score;
}
</script>

</body>
</html>
