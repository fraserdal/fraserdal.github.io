<!DOCTYPE html>
<html>
<head>
<title>Fraser's Arcade</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    margin:0;
}

h1{
    color:#4da3ff;
}

#menu{
    padding:30px;
}

.tile{
    display:inline-block;
    background:#222;
    width:200px;
    padding:20px;
    margin:10px;
    border-radius:10px;
    cursor:pointer;
    transition:.2s;
}

.tile:hover{
    background:#4da3ff;
    color:black;
}

.game{
    display:none;
    padding:20px;
}

button{
    padding:10px 15px;
    margin:5px;
    cursor:pointer;
}

#reactionBox{
    width:250px;
    height:250px;
    background:red;
    margin:20px auto;
    display:none;
    cursor:pointer;
}

#board{
    width:306px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:3px;
}

.cell{
    width:100px;
    height:100px;
    background:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🎮 Fraser's Arcade</h1>

<div id="menu">

<div class="tile" onclick="showGame('reaction')">
⚡ Reaction Time
</div>

<div class="tile" onclick="showGame('ttt')">
❌⭕ Tic-Tac-Toe
</div>

<div class="tile" onclick="showGame('rps')">
🪨 Rock Paper Scissors
</div>

<div class="tile" onclick="showGame('higher')">
🎲 Higher or Lower
</div>

</div>

<!-- REACTION -->

<div id="reaction" class="game">

<h2>⚡ Reaction Time</h2>

<button onclick="startReaction()">Start</button>
<button onclick="backToMenu()">Back</button>

<div id="reactionBox"></div>

<h3 id="reactionResult"></h3>

</div>

<!-- TIC TAC TOE -->

<div id="ttt" class="game">

<h2>❌⭕ Tic-Tac-Toe</h2>

<button onclick="resetTTT()">Reset</button>
<button onclick="backToMenu()">Back</button>

<div id="board"></div>

<h3 id="tttResult"></h3>

</div>

<!-- RPS -->

<div id="rps" class="game">

<h2>🪨 Rock Paper Scissors</h2>

<button onclick="playRPS('Rock')">Rock</button>
<button onclick="playRPS('Paper')">Paper</button>
<button onclick="playRPS('Scissors')">Scissors</button>

<br><br>

<button onclick="backToMenu()">Back</button>

<h3 id="rpsResult"></h3>

</div>

<!-- HIGHER LOWER -->

<div id="higher" class="game">

<h2>🎲 Higher or Lower</h2>

<p id="currentNumber"></p>

<button onclick="guessHigher()">Higher</button>
<button onclick="guessLower()">Lower</button>

<br><br>

<button onclick="backToMenu()">Back</button>

<h3 id="higherResult"></h3>
<h3 id="higherScore"></h3>

</div>

<script>

/* MENU */

function showGame(id){

    document.getElementById("menu").style.display="none";

    document.querySelectorAll(".game").forEach(g=>{
        g.style.display="none";
    });

    document.getElementById(id).style.display="block";
}

function backToMenu(){

    document.getElementById("menu").style.display="block";

    document.querySelectorAll(".game").forEach(g=>{
        g.style.display="none";
    });
}

/* REACTION TIME */

let reactionStart;
let canClick=false;
let bestTime=localStorage.getItem("bestTime");

function startReaction(){

    const box=document.getElementById("reactionBox");

    box.style.display="none";
    canClick=false;

    document.getElementById("reactionResult").innerText=
    "Wait for green...";

    let delay=Math.random()*4000+1000;

    setTimeout(()=>{

        box.style.background="green";
        box.style.display="block";

        reactionStart=Date.now();
        canClick=true;

    },delay);
}

document.getElementById("reactionBox").onclick=function(){

    if(!canClick){
        document.getElementById("reactionResult").innerText=
        "Too soon!";
        return;
    }

    let time=Date.now()-reactionStart;

    if(!bestTime || time<bestTime){
        bestTime=time;
        localStorage.setItem("bestTime",time);
    }

    document.getElementById("reactionResult").innerText=
    "Time: "+time+"ms | Best: "+bestTime+"ms";

    this.style.display="none";
};

/* TIC TAC TOE */

let board=["","","","","","","","",""];
let player="X";

function drawBoard(){

    const b=document.getElementById("board");

    b.innerHTML="";

    board.forEach((value,index)=>{

        const cell=document.createElement("div");

        cell.className="cell";
        cell.innerText=value;

        cell.onclick=()=>move(index);

        b.appendChild(cell);
    });
}

function move(index){

    if(board[index]!="") return;

    board[index]=player;

    drawBoard();

    const wins=[
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    for(let w of wins){

        if(
            board[w[0]] &&
            board[w[0]]===board[w[1]] &&
            board[w[1]]===board[w[2]]
        ){
            document.getElementById("tttResult").innerText=
            player+" wins!";
            return;
        }
    }

    player=player==="X"?"O":"X";
}

function resetTTT(){

    board=["","","","","","","","",""];
    player="X";

    document.getElementById("tttResult").innerText="";

    drawBoard();
}

drawBoard();

/* RPS */

function playRPS(choice){

    const choices=["Rock","Paper","Scissors"];

    let cpu=
    choices[Math.floor(Math.random()*3)];

    let result="";

    if(choice===cpu){
        result="Draw";
    }
    else if(
        (choice==="Rock"&&cpu==="Scissors")||
        (choice==="Paper"&&cpu==="Rock")||
        (choice==="Scissors"&&cpu==="Paper")
    ){
        result="You win!";
    }
    else{
        result="Computer wins!";
    }

    document.getElementById("rpsResult").innerText=
    "CPU chose "+cpu+" - "+result;
}

/* HIGHER LOWER */

let currentNum=Math.floor(Math.random()*100)+1;
let score=0;

document.getElementById("currentNumber").innerText=
"Number: "+currentNum;

document.getElementById("higherScore").innerText=
"Score: 0";

function guessHigher(){
    playHigherLower(true);
}

function guessLower(){
    playHigherLower(false);
}

function playHigherLower(higher){

    let next=Math.floor(Math.random()*100)+1;

    let correct=
    higher ? next>currentNum : next<currentNum;

    if(correct){
        score++;
        document.getElementById("higherResult").innerText=
        "Correct!";
    }
    else{
        score=0;
        document.getElementById("higherResult").innerText=
        "Wrong!";
    }

    currentNum=next;

    document.getElementById("currentNumber").innerText=
    "Number: "+currentNum;

    document.getElementById("higherScore").innerText=
    "Score: "+score;
}

</script>

</body>
</html>
