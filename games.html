<!DOCTYPE html>
<html>
<head>
<title>Mini Arcade</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:white;
    text-align:center;
}

h1{
    color:#60a5fa;
    margin-top:20px;
}

#menu{
    padding:20px;
}

.tile{
    display:inline-block;
    width:220px;
    padding:20px;
    margin:10px;
    background:#1f2937;
    border-radius:15px;
    cursor:pointer;
    transition:.2s;
}

.tile:hover{
    transform:scale(1.05);
    background:#2563eb;
}

.game{
    display:none;
    max-width:700px;
    margin:20px auto;
    background:#111827;
    padding:20px;
    border-radius:15px;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#reactionBox{
    width:200px;
    height:200px;
    margin:20px auto;
    display:none;
    border-radius:15px;
    cursor:pointer;
}

#board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    width:306px;
    margin:20px auto;
    gap:3px;
}

.cell{
    width:100px;
    height:100px;
    background:#1f2937;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    cursor:pointer;
    border-radius:10px;
}

</style>
</head>

<body>

<h1>🎮 Mini Arcade</h1>

<!-- MENU -->
<div id="menu">

<div class="tile" onclick="showGame('reaction')">⚡ Reaction Time</div>
<div class="tile" onclick="showGame('ttt')">❌⭕ Tic-Tac-Toe</div>
<div class="tile" onclick="showGame('rps')">🪨 Rock Paper Scissors</div>
<div class="tile" onclick="showGame('higher')">🎲 Higher or Lower</div>

</div>

<!-- REACTION -->
<div id="reaction" class="game">

<h2>⚡ Reaction Time</h2>

<button onclick="startReaction()">Start</button>
<button onclick="back()">Back</button>

<div id="reactionBox"></div>

<h3 id="reactionResult"></h3>

</div>

<!-- TIC TAC TOE -->
<div id="ttt" class="game">

<h2>❌⭕ Tic-Tac-Toe (AI)</h2>

<button onclick="resetTTT()">Reset</button>
<button onclick="back()">Back</button>

<div id="board"></div>

<h3 id="tttResult"></h3>

</div>

<!-- RPS -->
<div id="rps" class="game">

<h2>🪨 Rock Paper Scissors (Best of 5)</h2>

<button onclick="playRPS('Rock')">Rock</button>
<button onclick="playRPS('Paper')">Paper</button>
<button onclick="playRPS('Scissors')">Scissors</button>

<br>
<button onclick="back()">Back</button>

<h3 id="rpsResult"></h3>

</div>

<!-- HIGHER LOWER -->
<div id="higher" class="game">

<h2>🎲 Higher or Lower</h2>

<p id="num"></p>

<button onclick="guess(true)">Higher</button>
<button onclick="guess(false)">Lower</button>

<br>
<button onclick="back()">Back</button>

<h3 id="hlResult"></h3>
<h3 id="hlScore"></h3>

</div>

<script>

/* MENU */
function showGame(id){
    document.getElementById("menu").style.display="none";
    document.querySelectorAll(".game").forEach(g=>g.style.display="none");
    document.getElementById(id).style.display="block";
}

function back(){
    document.getElementById("menu").style.display="block";
    document.querySelectorAll(".game").forEach(g=>g.style.display="none");
}

/* REACTION */
let start;
let canClick=false;
let best=localStorage.getItem("best")||99999;

function startReaction(){

    const box=document.getElementById("reactionBox");

    box.style.display="none";
    canClick=false;

    document.getElementById("reactionResult").innerText="Wait...";

    setTimeout(()=>{

        box.style.display="block";
        box.style.background="lime";

        start=Date.now();
        canClick=true;

    },Math.random()*3000+1000);
}

document.getElementById("reactionBox").onclick=function(){

    if(!canClick){
        document.getElementById("reactionResult").innerText="Too soon!";
        return;
    }

    let t=Date.now()-start;

    if(t<best){
        best=t;
        localStorage.setItem("best",best);
    }

    document.getElementById("reactionResult").innerText=
    `Time: ${t}ms | Best: ${best}ms`;

    this.style.display="none";
    canClick=false;
};

/* TIC TAC TOE AI */
let board=["","","","","","","","",""];
let player="X";

function draw(){

    const b=document.getElementById("board");
    b.innerHTML="";

    board.forEach((v,i)=>{

        let c=document.createElement("div");
        c.className="cell";
        c.innerText=v;

        c.onclick=()=>move(i);

        b.appendChild(c);
    });
}

function move(i){

    if(board[i]!="") return;

    board[i]=player;

    if(checkWin(player)){
        document.getElementById("tttResult").innerText="You win!";
        draw();
        return;
    }

    aiMove();

    draw();
}

function aiMove(){

    let empty=board.map((v,i)=>v===""?i:null).filter(v=>v!=null);

    let pick=empty[Math.floor(Math.random()*empty.length)];

    board[pick]="O";

    if(checkWin("O")){
        document.getElementById("tttResult").innerText="AI wins!";
    }
}

function checkWin(p){

    const w=[
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    return w.some(c=>
        board[c[0]]===p &&
        board[c[1]]===p &&
        board[c[2]]===p
    );
}

function resetTTT(){
    board=["","","","","","","","",""];
    player="X";
    document.getElementById("tttResult").innerText="";
    draw();
}

draw();

/* RPS BEST OF 5 */
let p=0,c=0;

function playRPS(choice){

    const ops=["Rock","Paper","Scissors"];
    let cpu=ops[Math.floor(Math.random()*3)];

    let res="";

    if(choice===cpu) res="Draw";
    else if(
        (choice=="Rock"&&cpu=="Scissors")||
        (choice=="Paper"&&cpu=="Rock")||
        (choice=="Scissors"&&cpu=="Paper")
    ){
        res="You win";
        p++;
    }else{
        res="CPU wins";
        c++;
    }

    if(p==3||c==3){
        document.getElementById("rpsResult").innerText=
        (p>c?"You won match!":"CPU won match!");

        p=0;c=0;
        return;
    }

    document.getElementById("rpsResult").innerText=
    `CPU: ${cpu} | ${res} | You ${p} - CPU ${c}`;
}

/* HIGHER LOWER */
let n=Math.floor(Math.random()*100);
let s=0;

document.getElementById("num").innerText="Number: "+n;

function guess(h){

    let next=Math.floor(Math.random()*100);

    if(h?next>n:next<n){
        s++;
        document.getElementById("hlResult").innerText="Correct";
    }else{
        s=0;
        document.getElementById("hlResult").innerText="Wrong";
    }

    n=next;

    document.getElementById("num").innerText="Number: "+n;
    document.getElementById("hlScore").innerText="Score: "+s;
}

</script>

</body>
</html>
