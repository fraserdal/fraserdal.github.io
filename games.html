<!DOCTYPE html>
<html>
<head>
    <title>Arcade Games</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
            margin: 0;
        }

        h1 {
            color: #4da3ff;
            margin-top: 20px;
        }

        .game {
            border-top: 1px solid #333;
            padding: 40px 10px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }

        canvas {
            background: black;
            margin-top: 10px;
        }

        #target {
            width: 40px;
            height: 40px;
            background: red;
            position: absolute;
            display: none;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>

<h1>Mini Arcade</h1>

<div id="menu">

    <div class="tile" onclick="showGame('aim')">🎯 Aim Trainer</div>
    <div class="tile" onclick="showGame('snake')">🐍 Snake</div>
    <div class="tile" onclick="showGame('flappy')">🐦 Flappy Bird</div>
    <div class="tile" onclick="showGame('memory')">🧠 Memory</div>

</div>

<!-- AIM -->
<div id="aim" class="game">
    <h2>Aim Trainer</h2>
    <button onclick="startAim()">Start</button>
    <h3 id="aimScore"></h3>
    <div id="target" onclick="hitTarget()"></div>
</div>

<!-- SNAKE -->
<div id="snake" class="game">
    <h2>Snake</h2>
    <canvas id="snakeCanvas" width="300" height="300"></canvas>
</div>

<!-- FLAPPY -->
<div id="flappy" class="game">
    <h2>Flappy Bird</h2>
    <canvas id="flappyCanvas" width="300" height="300"></canvas>
</div>

<!-- MEMORY -->
<div id="memory" class="game">
    <h2>Memory Game</h2>
    <button onclick="startMemory()">Start</button>
    <h3 id="memoryText"></h3>
</div>
</html>
