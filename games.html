<!DOCTYPE html>
<html>
<head>
    <title>Reaction Game</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #111;
            color: white;
            margin-top: 60px;
        }

        h1 {
            color: #4da3ff;
        }

        #box {
            width: 250px;
            height: 250px;
            margin: 40px auto;
            background: red;
            display: none;
            cursor: pointer;
            border-radius: 10px;
        }

        button {
            padding: 12px 20px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }

        a {
            color: #4da3ff;
        }
    </style>
</head>

<body>

    <h1>Reaction Time Game</h1>
    <p>Click start, then click the box as fast as you can when it appears.</p>

    <button onclick="startGame()">Start</button>

    <div id="box"></div>

    <h2 id="result"></h2>

    <p>
        <a href="index.html">Home</a> |
        <a href="about.html">About</a>
    </p>

   <script>
    let startTime = 0;
    let canClick = false;

    let bestTime = localStorage.getItem("bestTime");
    bestTime = bestTime ? parseInt(bestTime) : null;

    function updateBest(time) {
        if (bestTime === null || time < bestTime) {
            bestTime = time;
            localStorage.setItem("bestTime", bestTime);
        }
    }

    function startGame() {
        const box = document.getElementById("box");
        const result = document.getElementById("result");

        result.innerText = "";
        canClick = false;

        box.style.display = "none";
        box.style.backgroundColor = "red";

        let delay = Math.random() * 4000 + 1000;

        setTimeout(() => {
            box.style.display = "block";
            box.style.backgroundColor = "green";
            startTime = Date.now();
            canClick = true;
        }, delay);
    }

    document.getElementById("box").onclick = function () {
        const result = document.getElementById("result");

        // ❌ FALSE START
        if (!canClick) {
            result.innerText = "Too soon! Wait for green.";
            this.style.display = "none";
            return;
        }

        // ✅ VALID CLICK
        let reactionTime = Date.now() - startTime;

        updateBest(reactionTime);

        let text = "Your reaction time: " + reactionTime + " ms";

        if (bestTime !== null) {
            text += "\nBest time: " + bestTime + " ms";
        }

        result.innerText = text;

        this.style.display = "none";
        canClick = false;
    };
</script>
    

</body>
</html>
